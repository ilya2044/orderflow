networks:
  order-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  elasticsearch_data:
  minio_data:
  grafana_data:
  prometheus_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: order_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    networks:
      - order-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: order_mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo
      MONGO_INITDB_ROOT_PASSWORD: mongo
      MONGO_INITDB_DATABASE: product_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "--username", "mongo", "--password", "mongo", "--authenticationDatabase", "admin"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: order_redis
    command: redis-server --requirepass redis --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: order_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - order-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: order_kafka
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - order-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 15s
      retries: 15
      start_period: 60s

  migrate:
    image: postgres:16-alpine
    container_name: order_migrate
    volumes:
      - ./scripts/run-migrations.sh:/run-migrations.sh:ro
      - ./auth-service/migrations:/migrations/auth:ro
      - ./user-service/migrations:/migrations/user:ro
      - ./order-service/migrations:/migrations/order:ro
      - ./inventory-service/migrations:/migrations/inventory:ro
      - ./payment-service/migrations:/migrations/payment:ro
    environment:
      PGPASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/bin/sh", "/run-migrations.sh"]
    networks:
      - order-network
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: order_kafka_ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - order-network

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: order_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=order-cluster
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - order-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: order_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - order-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: order_jaeger
    ports:
      - "6831:6831/udp"
      - "16686:16686"
      - "14268:14268"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - order-network

  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: order_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - order-network

  grafana:
    image: grafana/grafana:10.3.1
    container_name: order_grafana
    depends_on:
      - prometheus
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - order-network

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: order_api_gateway
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      AUTH_SERVICE_URL: "http://auth-service:8081"
      USER_SERVICE_URL: "http://user-service:8082"
      PRODUCT_SERVICE_URL: "http://product-service:8083"
      ORDER_SERVICE_URL: "http://order-service:8084"
      INVENTORY_SERVICE_URL: "http://inventory-service:8085"
      PAYMENT_SERVICE_URL: "http://payment-service:8086"
      NOTIFICATION_SERVICE_URL: "http://notification-service:8087"
      REDIS_URL: "redis://:redis@redis:6379/0"
      JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
      LOG_LEVEL: "info"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - order-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: order_auth_service
    environment:
      PORT: "8081"
      GRPC_PORT: "9081"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/auth_db?sslmode=disable"
      REDIS_URL: "redis://:redis@redis:6379/1"
      JWT_SECRET: "super-secret-jwt-key-change-in-production-min-32-chars"
      JWT_ACCESS_EXPIRE_MINUTES: "60"
      JWT_REFRESH_EXPIRE_DAYS: "7"
      LOG_LEVEL: "info"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - order-network
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: order_user_service
    environment:
      PORT: "8082"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/user_db?sslmode=disable"
      REDIS_URL: "redis://:redis@redis:6379/2"
      LOG_LEVEL: "info"
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - order-network
    restart: unless-stopped

  product-service:
    build:
      context: .
      dockerfile: product-service/Dockerfile
    container_name: order_product_service
    environment:
      PORT: "8083"
      MONGO_URL: "mongodb://mongo:mongo@mongo:27017/product_db?authSource=admin"
      ELASTICSEARCH_URL: "http://elasticsearch:9200"
      REDIS_URL: "redis://:redis@redis:6379/3"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin123"
      MINIO_BUCKET: "products"
      LOG_LEVEL: "info"
    depends_on:
      mongo:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - order-network
    restart: unless-stopped

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order_order_service
    environment:
      PORT: "8084"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/order_db?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      REDIS_URL: "redis://:redis@redis:6379/4"
      INVENTORY_SERVICE_URL: "http://inventory-service:8085"
      PAYMENT_SERVICE_URL: "http://payment-service:8086"
      LOG_LEVEL: "info"
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    networks:
      - order-network
    restart: unless-stopped

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: order_inventory_service
    environment:
      PORT: "8085"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/inventory_db?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      LOG_LEVEL: "info"
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    networks:
      - order-network
    restart: unless-stopped

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: order_payment_service
    environment:
      PORT: "8086"
      DATABASE_URL: "postgres://postgres:postgres@postgres:5432/payment_db?sslmode=disable"
      KAFKA_BROKERS: "kafka:9092"
      LOG_LEVEL: "info"
    depends_on:
      migrate:
        condition: service_completed_successfully
      kafka:
        condition: service_started
    networks:
      - order-network
    restart: unless-stopped

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: order_notification_service
    environment:
      PORT: "8087"
      KAFKA_BROKERS: "kafka:9092"
      REDIS_URL: "redis://:redis@redis:6379/5"
      SMTP_HOST: "smtp.gmail.com"
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      LOG_LEVEL: "info"
    depends_on:
      kafka:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - order-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: order_frontend
    ports:
      - "3000:3000"
    environment:
      API_GATEWAY_URL: "http://api-gateway:8080"
    networks:
      - order-network
    restart: unless-stopped

  nginx:
    image: nginx:1.25-alpine
    container_name: order_nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend
    networks:
      - order-network
    restart: unless-stopped

syntax = "proto3";

package auth;

option go_package = "github.com/diploma/auth-service/proto/auth";

service AuthService {
    rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
    rpc GetUserInfo   (GetUserInfoRequest)   returns (GetUserInfoResponse);
}

message ValidateTokenRequest {
    string token = 1;
}

message ValidateTokenResponse {
    bool   valid   = 1;
    string user_id = 2;
    string email   = 3;
    string role    = 4;
}

message GetUserInfoRequest {
    string user_id = 1;
}

message GetUserInfoResponse {
    string user_id   = 1;
    string email     = 2;
    string username  = 3;
    string role      = 4;
    bool   is_active = 5;
}
